<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{.Title}}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', sans-serif; background: #f5f0eb; color: #1a1a1a; }
.header { background: #fff; border-bottom: 1px solid #d5ccc0; padding: 1rem 2rem; display: flex; align-items: center; justify-content: space-between; }
.header h1 { font-family: 'Playfair Display', serif; font-size: 1.1rem; font-weight: 700; color: #5c1f2b; text-transform: uppercase; letter-spacing: 2px; }
.header a { font-size: 0.8rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: #5c1f2b; text-decoration: none; }
.header a:hover { color: #8b3a4a; }
.content { max-width: 1000px; margin: 0 auto; padding: 2rem; }
.actions { margin-bottom: 1.5rem; }
.btn { display: inline-block; padding: 0.6rem 1.25rem; background: #5c1f2b; color: #fff; text-decoration: none; border-radius: 4px; font-size: 0.8rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; border: none; font-family: 'Inter', sans-serif; cursor: pointer; }
.btn:hover { background: #8b3a4a; }
.btn-sm { padding: 0.35rem 0.75rem; font-size: 0.7rem; }
.btn-danger { background: #8b2f2f; }
.btn-danger:hover { background: #b04444; }
.btn-success { background: #2d6b3f; }
.btn-success:hover { background: #3d8a54; }
.btn-secondary { background: #d5ccc0; color: #333; }
.btn-secondary:hover { background: #bfb4a5; }
table { width: 100%; background: #fff; border: 1px solid #d5ccc0; border-radius: 4px; overflow: hidden; }
th { background: #ede8e0; text-align: left; padding: 0.7rem 1rem; font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: #555; }
td { padding: 0.7rem 1rem; border-top: 1px solid #d5ccc0; font-size: 0.9rem; vertical-align: middle; }
td a { color: #5c1f2b; text-decoration: none; }
tr:hover td { background: #faf8f5; }
.date { color: #888; font-size: 0.8rem; }
.cat { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; color: #888; }
.actions-cell { white-space: nowrap; }
.actions-cell form { display: inline; }
.dungeon-icon { font-size: 1.2rem; margin-right: 0.3rem; }
.empty-state { color: #888; text-align: center; padding: 3rem; }
</style>
</head>
<body>
<div class="header">
<h1>Dungeon</h1>
<a href="/admin">← Dashboard</a>
</div>
<div class="content">
<div class="actions">
<a href="/admin" class="btn btn-secondary">← Back to Dashboard</a>
</div>
{{if .Entries}}
<table>
<tr><th>Title</th><th>Date</th><th>Category</th><th>Actions</th></tr>
{{range .Entries}}
<tr>
<td>{{.Title}}</td>
<td class="date">{{.Date}}</td>
<td class="cat">{{.Category}}</td>
<td class="actions-cell">
<form method="POST" action="/admin/dungeon/restore/{{.Slug}}" style="display:inline">
<button type="submit" class="btn btn-sm btn-success">Restore</button>
</form>
<form method="POST" action="/admin/dungeon/permanent-delete/{{.Slug}}" style="display:inline" onsubmit="return confirm('Permanently delete {{.Title}}? This cannot be undone.')">
<button type="submit" class="btn btn-sm btn-danger">Delete Forever</button>
</form>
</td>
</tr>
{{end}}
</table>
{{else}}
<p class="empty-state">The dungeon is empty.</p>
{{end}}
</div>
</body>
</html>
