<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{.Title}}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@400;700&family=Source+Serif+4:opsz@8..60&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', sans-serif; background: #f5f0eb; color: #1a1a1a; }
.header { background: #fff; border-bottom: 1px solid #d5ccc0; padding: 1rem 2rem; display: flex; align-items: center; justify-content: space-between; }
.header h1 { font-family: 'Playfair Display', serif; font-size: 1.1rem; font-weight: 700; color: #5c1f2b; text-transform: uppercase; letter-spacing: 2px; }
.header a { font-size: 0.8rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: #5c1f2b; text-decoration: none; }
.header a:hover { color: #8b3a4a; }
.content { max-width: 800px; margin: 0 auto; padding: 2rem; }
.form-group { margin-bottom: 1.25rem; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
label { display: block; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: #555; margin-bottom: 0.35rem; }
input, textarea, select { width: 100%; padding: 0.6rem 0.8rem; border: 1px solid #d5ccc0; border-radius: 4px; font-family: 'Inter', sans-serif; font-size: 0.9rem; background: #fff; }
input:focus, textarea:focus { outline: none; border-color: #5c1f2b; }
textarea { font-family: 'Source Serif 4', Georgia, serif; line-height: 1.7; resize: vertical; }
.form-footer { display: flex; gap: 0.75rem; align-items: center; padding-top: 0.5rem; }
.btn { padding: 0.65rem 1.5rem; background: #5c1f2b; color: #fff; border: none; border-radius: 4px; font-family: 'Inter', sans-serif; font-size: 0.8rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; }
.btn:hover { background: #8b3a4a; }
.btn-secondary { background: #d5ccc0; color: #333; }
.btn-secondary:hover { background: #bfb4a5; }
.hint { font-size: 0.78rem; color: #888; margin-top: 0.25rem; }
.preview-area { margin-top: 1.5rem; border: 1px solid #d5ccc0; border-radius: 4px; background: #fff; padding: 1.5rem; display: none; font-family: 'Source Serif 4', Georgia, serif; line-height: 1.8; font-size: 1.05rem; }
.preview-area h1 { font-family: 'Playfair Display', serif; font-size: 1.6rem; color: #5c1f2b; margin: 1.5rem 0 0.5rem; }
.preview-area p { margin-bottom: 0.75rem; }
</style>
</head>
<body>
<div class="header">
<h1>Scribblesplash</h1>
<a href="/admin">← Dashboard</a>
</div>
<div class="content">
{{if .IsNew}}<h1 style="font-size: 1.4rem; margin-bottom: 1.5rem; color: #5c1f2b;">New Article</h1>{{else}}<h1 style="font-size: 1.4rem; margin-bottom: 1.5rem; color: #5c1f2b;">Edit Article</h1>{{end}}
<form method="POST">
<div class="form-row">
<div class="form-group">
<label for="title">Title</label>
<input type="text" name="title" id="title" value="{{.ArticleTitle}}" required>
</div>
<div class="form-group">
<label for="slug">Slug</label>
<input type="text" name="slug" id="slug" value="{{.Slug}}" required>
<div class="hint">Auto-generated from title if empty. Used in URL.</div>
</div>
</div>
<div class="form-row">
<div class="form-group">
<label for="date">Date</label>
<input type="date" name="date" id="date" value="{{.Date}}" required>
</div>
<div class="form-group">
<label for="category">Category</label>
<input type="text" name="category" id="category" value="{{.Category}}" placeholder="e.g. life, psychology, awareness">
</div>
</div>
<div class="form-group">
<label for="image_url">Image URL</label>
<input type="url" name="image_url" id="image_url" value="{{.ImageURL}}" placeholder="https://...">
</div>
<div class="form-group">
<label for="tags">Tags</label>
<input type="text" name="tags" id="tags" value="{{.Tags}}" placeholder="Comma separated">
</div>
<div class="form-group">
<label>
<input type="checkbox" name="written_by_self" id="written_by_self"{{if and .IsNew (not .AuthorName)}} checked{{else if not .AuthorName}} checked{{end}} onchange="toggleAuthorFields()">
Written by Self (The Waterman)
</label>
</div>
<div id="author-fields" style="display: {{if or .AuthorName (not .IsNew)}}{{if .AuthorName}}block{{else}}none{{end}}{{else}}none{{end}};">
<div class="form-row">
<div class="form-group">
<label for="author_name">Display Name</label>
<input type="text" name="author_name" id="author_name" value="{{.AuthorName}}" placeholder="e.g. Mukul Godbole">
</div>
<div class="form-group">
<label for="author_link">Author Link <span style="font-weight:400;text-transform:none;letter-spacing:0;">(optional)</span></label>
<input type="url" name="author_link" id="author_link" value="{{.AuthorLink}}" placeholder="https://...">
</div>
</div>
</div>
<script>
function toggleAuthorFields() {
  var cb = document.getElementById('written_by_self');
  var fields = document.getElementById('author-fields');
  fields.style.display = cb.checked ? 'none' : 'block';
}
</script>
<div class="form-group">
<label for="excerpt">Excerpt</label>
<textarea name="excerpt" id="excerpt" rows="3" maxlength="500">{{.Excerpt}}</textarea>
</div>
<div class="form-group">
<label for="body">Body (Markdown)</label>
<textarea name="body" id="body" rows="20" style="min-height: 400px;">{{.Body}}</textarea>
</div>
<div class="form-footer">
<button type="submit" class="btn">{{if .IsNew}}Publish{{else}}Save Changes{{end}}</button>
<a href="/admin" class="btn btn-secondary">Cancel</a>
</div>
</form>
</div>
</body>
</html>
