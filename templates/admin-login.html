<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{.Title}}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', sans-serif; background: #f5f0eb; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
.login { background: #fff; padding: 2.5rem; border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); width: 100%; max-width: 400px; }
h1 { font-size: 1.3rem; font-weight: 700; color: #5c1f2b; margin-bottom: 0.25rem; }
p { font-size: 0.85rem; color: #888; margin-bottom: 1.5rem; }
.error { color: #c0392b; font-size: 0.85rem; margin-bottom: 1rem; padding: 0.5rem; background: #fde8e8; border-radius: 4px; }
label { display: block; font-size: 0.8rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: #555; margin-bottom: 0.4rem; }
input { width: 100%; padding: 0.7rem 0.9rem; border: 1px solid #d5ccc0; border-radius: 4px; font-size: 0.95rem; margin-bottom: 1.25rem; }
input:focus { outline: none; border-color: #5c1f2b; }
button { width: 100%; padding: 0.75rem; background: #5c1f2b; color: #fff; border: none; border-radius: 4px; font-family: 'Inter', sans-serif; font-size: 0.85rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; }
button:hover { background: #8b3a4a; }
</style>
</head>
<body>
<div class="login">
<h1>Scribblesplash</h1>
<p>Admin panel</p>
{{if .Error}}<div class="error">{{.Error}}</div>{{end}}
<form method="POST">
<label for="password">Password</label>
<input type="password" name="password" id="password" autofocus>
<button type="submit">Log In</button>
</form>
</div>
</body>
</html>
